name: Unit Test

on:
  push:
    branches: [ main ]

jobs:
  unit-test:
    name: unit-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api_server

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Set environment to Test
        run: export ENVIRONMENT=test

      - name: Run ministack docker container
        run: docker compose up -d aws-lambda-init ministack 

      - name: Run tests
        run: uv run pytest tests --cov=. --cov-report=html

      - name: Stop ministack docker container
        run: docker compose down aws-lambda-init ministack