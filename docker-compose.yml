services:
  ministack:
    image: ministackorg/ministack
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
  
  ministack-ui:
    image: davireis/stackport
    ports:
      - "8080:8080"
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
    depends_on:
      - ministack

  aws-lambda-init:
    build: ./aws_lambda
    command: [ "uv", "run", "main.py" ]
    restart: "no"
    depends_on:
      - ministack
  
  valkey:
    image: valkey/valkey:latest
    container_name: valkey-server
    ports:
      - "6379:6379"
    restart: always

  api_server:
    build: ./api_server
    ports:
      - "8000:8000"
    depends_on:
      - ministack
      - valkey

  nginx:
    build: ./nginx
    ports:
      - "443:443"
    depends_on:
      - api_server

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
  
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - loki
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/datasource:/etc/grafana/provisioning/datasources
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards

  tempo:
    image: grafana/tempo:latest
    command: "-target=all -config.file=/etc/tempo.yaml"
    restart: always
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200" # tempo
      - "4317:4317" # Tempo OTLP GRPC
      - "4318:4318" # Tempo OTLP HTTP

volumes:
  grafana_data: