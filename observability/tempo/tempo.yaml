
partition_ring_live_store: true
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

memberlist:
  node_name: tempo
  bind_port: 7946
  join_members:
    - tempo:7946

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  #log_received_spans:
  #    enabled: true
  #  log_discarded_spans:
  #    enabled: true

backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: 1h

backend_worker:
  backend_scheduler_addr: localhost:3200
  compaction:
    block_retention: 1h
  ring:
    kvstore:
      store: memberlist

querier:
  query_live_store: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal # where to store the wal locally
    local:
      path: /var/tempo/blocks # where to store the traces locally



block_builder:
  consume_cycle_duration: 30s

usage_report:
  reporting_enabled: false
